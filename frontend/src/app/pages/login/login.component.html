<main class="flex flex-col md:flex-row w-full min-h-screen">
  <!-- Left Side: Login Form -->
  <section class="flex-1 flex items-center justify-center p-6 bg-[#450C21]">
    <div class="w-full max-w-md space-y-6">
      <header class="text-left">
        <h1 class="text-3xl font-bold text-[#FBF2DA]">Login</h1>
      </header>

      <form class="space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="space-y-1">
          <label class="text-sm font-semibold text-[#FBF2DA] block" for="username">Username</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#FBF2DA]/60 group-focus-within:text-[#8CA888] transition-colors">person</span>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Enter your username"
              autocomplete="username"
              class="w-full pl-11 pr-4 py-3 bg-[#A33E43] placeholder-[#FBF2DA]/60 text-[#FBF2DA] border-2 border-[#A33E43] focus:border-[#8CA888] focus:ring-2 focus:ring-[#8CA888]/40 rounded-lg transition-all outline-none text-sm"
            />
          </div>
        </div>

        <div class="space-y-1">
          <div class="flex justify-between items-center">
            <label class="text-sm font-semibold text-[#FBF2DA] block" for="password">Password</label>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#FBF2DA]/60 group-focus-within:text-[#8CA888] transition-colors">lock</span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              class="w-full pl-11 pr-11 py-3 bg-[#A33E43] placeholder-[#FBF2DA]/60 text-[#FBF2DA] border-2 border-[#A33E43] focus:border-[#8CA888] focus:ring-2 focus:ring-[#8CA888]/40 rounded-lg transition-all outline-none text-sm"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[#FBF2DA]/60 hover:text-[#8CA888]"
            >
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        @if (loginError) {
          <p class="text-xs font-semibold text-red-400" role="alert">{{ loginError }}</p>
        }

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="submitting"
            class="w-full bg-[#D9FFD2] text-[#450C21] py-3 px-6 rounded-xl font-bold text-base shadow-lg shadow-black/20 hover:brightness-105 active:scale-[0.98] disabled:opacity-60 disabled:active:scale-100 transition-all flex items-center justify-center gap-2"
          >
            {{ submitting ? 'Logging in…' : 'Login' }}
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>
      </form>

      <div class="pt-2 text-left">
        <p class="text-sm text-[#FBF2DA]">
          Don't have an account?
          <button type="button" (click)="openRegisterModal()" class="text-[#8CA888] font-semibold hover:underline decoration-2 underline-offset-4">Register here</button>
        </p>
      </div>

    </div>
  </section>

  <!-- Right Side: Full-height Brand Image -->
  <section class="hidden md:block flex-1 relative overflow-hidden">
    <img
      class="w-full h-full object-cover"
      src="brand/background.jpg"
      alt="IBM AutoMinutes brand image"
    />
    <div class="absolute inset-0 bg-black/10 flex items-center justify-center">
      <div class="text-center">
        <h2 class="text-5xl font-extrabold text-[#FBF2DA] drop-shadow-xl uppercase tracking-tighter">ibm autominutes</h2>
      </div>
    </div>
  </section>

  <!-- Register Modal -->
  @if (showRegisterModal) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" (click)="closeRegisterModal()">
      <div class="w-full max-w-md bg-[#450C21] rounded-xl p-6 space-y-4" (click)="$event.stopPropagation()">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-bold text-[#FBF2DA]">Register</h2>
          <button type="button" (click)="closeRegisterModal()" class="text-[#FBF2DA]/60 hover:text-[#FBF2DA]">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <form class="space-y-4" [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()" novalidate>
          <div class="space-y-1">
            <label class="text-sm font-semibold text-[#FBF2DA] block" for="reg-username">Username</label>
            <input
              id="reg-username"
              type="text"
              formControlName="username"
              placeholder="Pick a username"
              autocomplete="username"
              class="w-full px-4 py-3 bg-[#A33E43] placeholder-[#FBF2DA]/60 text-[#FBF2DA] border-2 border-[#A33E43] focus:border-[#8CA888] focus:ring-2 focus:ring-[#8CA888]/40 rounded-lg transition-all outline-none text-sm"
            />
          </div>

          <div class="space-y-1">
            <label class="text-sm font-semibold text-[#FBF2DA] block" for="reg-email">Email</label>
            <input
              id="reg-email"
              type="email"
              formControlName="email"
              placeholder="Enter your email"
              autocomplete="email"
              class="w-full px-4 py-3 bg-[#A33E43] placeholder-[#FBF2DA]/60 text-[#FBF2DA] border-2 border-[#A33E43] focus:border-[#8CA888] focus:ring-2 focus:ring-[#8CA888]/40 rounded-lg transition-all outline-none text-sm"
            />
          </div>

          <div class="space-y-1">
            <label class="text-sm font-semibold text-[#FBF2DA] block" for="reg-password">Password</label>
            <input
              id="reg-password"
              type="password"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="new-password"
              class="w-full px-4 py-3 bg-[#A33E43] placeholder-[#FBF2DA]/60 text-[#FBF2DA] border-2 border-[#A33E43] focus:border-[#8CA888] focus:ring-2 focus:ring-[#8CA888]/40 rounded-lg transition-all outline-none text-sm"
            />
          </div>

          @if (registerError) {
            <p class="text-xs font-semibold text-red-400" role="alert">{{ registerError }}</p>
          }

          <button
            type="submit"
            [disabled]="registerSubmitting"
            class="w-full bg-[#D9FFD2] text-[#450C21] py-3 px-6 rounded-xl font-bold text-base shadow-lg shadow-black/20 hover:brightness-105 active:scale-[0.98] disabled:opacity-60 transition-all"
          >
            {{ registerSubmitting ? 'Registering…' : 'Register' }}
          </button>
        </form>
      </div>
    </div>
  }  

</main>
