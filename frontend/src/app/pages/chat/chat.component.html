<aside class="h-screen w-64 fixed left-0 top-0 bg-[#A33E43] shadow-sm flex flex-col py-2 z-50">
  <div class="px-6 py-4 mb-8 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-[#450C21] flex items-center justify-center text-[#FBF2DA]">
      <span class="material-symbols-outlined">dashboard</span>
    </div>
  </div>

  <nav class="flex-1 space-y-1">
    <a routerLink="/dashboard"
       class="flex items-center gap-3 pl-4 py-3 mx-2 rounded-lg text-[#FBF2DA] hover:bg-[#FBF2DA] hover:text-[#450C21] hover:font-bold transition-all">
      <span class="material-symbols-outlined">home</span>
      <span class="text-sm font-semibold">Home</span>
    </a>
    <a routerLink="/calendar"
       class="flex items-center gap-3 pl-5 py-3 mx-2 rounded-lg text-[#FBF2DA]/85 hover:bg-[#450C21]/30 transition-colors">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="text-sm font-semibold">Calendar</span>
    </a>
    <a routerLink="/meetings"
       class="flex items-center gap-3 pl-5 py-3 mx-2 rounded-lg text-[#FBF2DA]/85 hover:bg-[#450C21]/30 transition-colors">
      <span class="material-symbols-outlined">groups</span>
      <span class="text-sm font-semibold">Meetings</span>
    </a>
    <a routerLink="/chat"
       class="flex items-center gap-3 pl-4 py-3 mx-2 rounded-lg text-[#450C21] bg-[#FBF2DA] font-bold transition-all">
      <span class="material-symbols-outlined">chat</span>
      <span class="text-sm font-semibold">Chat</span>
    </a>
    <a href="#" class="flex items-center gap-3 pl-5 py-3 mx-2 rounded-lg text-[#FBF2DA]/85 hover:bg-[#450C21]/30 transition-colors">
      <span class="material-symbols-outlined">settings</span>
      <span class="text-sm font-semibold">Settings</span>
    </a>
  </nav>

  <div class="mt-auto px-4 pb-6">
    <button routerLink="/" class="w-full flex items-center gap-3 pl-5 py-3 text-[#FBF2DA]/85 hover:bg-[#450C21]/30 transition-colors rounded-lg">
      <span class="material-symbols-outlined">logout</span>
      <span class="text-sm font-semibold">Logout</span>
    </button>
  </div>
</aside>

<main class="ml-64 h-screen bg-[#450C21] flex">
  <!-- Conversation list -->
  <div class="w-80 border-r border-[#FBF2DA]/10 flex flex-col shrink-0">
    <div class="p-6 pb-4">
      <h1 class="text-2xl font-bold text-[#FBF2DA]">Chat</h1>
    </div>
    <div class="flex-1 overflow-y-auto px-3 space-y-1">
      @for (conversation of conversations; track conversation.name) {
        <button
          type="button"
          class="w-full flex items-center gap-3 p-3 rounded-lg text-left transition-colors"
          [class.bg-[#A33E43]]="conversation.active"
          [class.hover:bg-[#A33E43]/40]="!conversation.active"
        >
          <div class="w-10 h-10 rounded-full bg-[#75C3D1] text-[#450C21] flex items-center justify-center font-bold text-sm shrink-0">{{ conversation.initials }}</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-[#FBF2DA] truncate">{{ conversation.name }}</p>
            <p class="text-xs text-[#FBF2DA]/60 truncate">{{ conversation.lastMessage }}</p>
          </div>
        </button>
      }
    </div>
  </div>

  <!-- Active conversation -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 flex items-center gap-3 px-6 border-b border-[#FBF2DA]/10 shrink-0">
      <div class="w-9 h-9 rounded-full bg-[#75C3D1] text-[#450C21] flex items-center justify-center font-bold text-sm">AA</div>
      <p class="text-sm font-semibold text-[#FBF2DA]">Ana Antonescu</p>
    </div>

    <div class="flex-1 overflow-y-auto px-6 py-6 space-y-4">
      @for (message of messages; track $index) {
        <div class="flex" [class.justify-end]="message.from === 'me'">
          <div class="max-w-md">
            <div
              class="px-4 py-3 rounded-2xl text-sm"
              [class.bg-[#75C3D1]]="message.from === 'me'"
              [class.text-[#450C21]]="message.from === 'me'"
              [class.rounded-br-sm]="message.from === 'me'"
              [class.bg-[#FBF2DA]]="message.from === 'other'"
              [class.text-[#450C21]]="message.from === 'other'"
              [class.rounded-bl-sm]="message.from === 'other'"
            >{{ message.text }}</div>
            <p class="text-[10px] text-[#FBF2DA]/40 mt-1" [class.text-right]="message.from === 'me'">{{ message.time }}</p>
          </div>
        </div>
      }
    </div>

    <div class="p-4 border-t border-[#FBF2DA]/10 shrink-0">
      <form class="flex items-center gap-3" (ngSubmit)="sendMessage()">
        <input
          type="text"
          [(ngModel)]="draft"
          name="draft"
          placeholder="Type a message..."
          class="flex-1 px-4 py-3 bg-[#A33E43] text-[#FBF2DA] placeholder-[#FBF2DA]/50 rounded-xl outline-none text-sm focus:ring-2 focus:ring-[#75C3D1]"
        />
        <button
          type="submit"
          class="w-12 h-12 rounded-xl bg-[#D9FFD2] text-[#1c2e1a] flex items-center justify-center hover:brightness-95 active:scale-95 transition-all shrink-0"
        >
          <span class="material-symbols-outlined">send</span>
        </button>
      </form>
    </div>
  </div>
</main>
